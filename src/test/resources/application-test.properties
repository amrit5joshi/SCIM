# H2 in-memory datasource with MySQL compatibility mode for tests.
# create-drop rebuilds the schema on every test run.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway is disabled in tests; H2 ddl-auto=create-drop manages the schema instead.
spring.flyway.enabled=false

scim.auth.token=test-token-12345

logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.amrit.scim=INFO
