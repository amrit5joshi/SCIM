# =============================================================================
# application-test.properties
#
# Overrides for the test slice. Spring Boot picks this up automatically when
# the active profile is "test" (set via @ActiveProfiles("test")).
#
# We swap MySQL for an H2 in-memory database so tests run without Docker.
# MODE=MySQL tells H2 to accept MySQL-specific syntax (e.g. backtick quoting).
# create-drop means H2 builds the schema fresh for every test run and drops
# it at the end — no leftover state between runs.
# =============================================================================

# H2 in-memory datasource — MODE=MySQL for MySQL DDL compatibility
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Use H2Dialect so Hibernate generates H2-compatible DDL (no ENGINE=InnoDB)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Keep SQL logging off in tests to reduce noise
spring.jpa.show-sql=false

# Use the same static token in tests as we assert in controller tests
scim.auth.token=test-token-12345

# Suppress security and framework noise in test output
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.amrit.scim=INFO

