# =============================================================================
# application.properties
#
# All externalised configuration lives here. In a real project you'd use
# environment-variable overrides or Spring profiles (dev/prod) — but for a
# learning project one flat file is easiest to explain in an interview.
# =============================================================================

# ---------- Server ----------
server.port=8080

# ---------- DataSource (MySQL) ----------
# Matches the docker-compose.yml service name, port, and DB name.
spring.datasource.url=jdbc:mysql://localhost:3306/scimdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=scim
spring.datasource.password=scim123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
# update  = create/alter tables automatically on startup.
# For a portfolio project this is fine; production code uses Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------- SCIM Auth ----------
# The single static bearer token that clients (Okta, Entra ID, etc.) must send.
# In production this would be a secret loaded from a vault, not a properties file.
scim.auth.token=super-secret-scim-token-change-me

# ---------- OpenAPI / Swagger ----------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Allow Swagger UI through Security without a bearer token (convenience for dev)
springdoc.swagger-ui.csrf.enabled=false

# ---------- Logging ----------
logging.level.com.amrit.scim=DEBUG
logging.level.org.springframework.security=INFO
