server.port=8080

# --- DataSource (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/scimdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=scim
spring.datasource.password=scim123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# 'validate' lets Hibernate check the schema against the entities but never mutates it.
# Flyway owns all DDL via versioned migration scripts in db/migration/.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SCIM Auth ---
# Static bearer token loaded at startup. Replace with OAuth2 resource server for production.
scim.auth.token=super-secret-scim-token-change-me

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.csrf.enabled=false

# --- Logging ---
logging.level.com.amrit.scim=DEBUG
logging.level.org.springframework.security=INFO
